<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Nutri-Stream</title>
  <style>
    body {
      overflow: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #real {
      transition: transform 0.3s ease;
    }
    
    #real:hover {
      transform: scale(0.9); 
    }
    .card-title { font-size: 18px; font-weight: 500; }
    .card-desc { font-size: 13px; color: #a09870; margin-top: 8px; }
  </style>
</head>
<body>

  <div style="text-align: center; margin-bottom: 60px;">
    <h1 style="font-size: 48px; letter-spacing: -1px;">Nutri-Stream</h1>
    <div style="width: 60px; height: 4px; background: #f1f0cc; margin: 10px auto; border-radius: 2px;"></div>
    <p style="line-height: 1.6; font-size: 16px; color:#a09870;">The future of hydroponic systems</p>
  </div>

  <div id="real">
    <a href="greenhouse.html" style="
      display: block;
      background: #8d775f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 15px;
      padding: 35px 50px;
      text-decoration: none;
      color: #f1f0cc;
      text-align: center;
    ">
      <i class="fa-solid fa-chart-line" style="font-size: 32px; margin-bottom: 15px; display: block;"></i>
      <div class="card-title">Dashboard</div>
      <div class="card-desc">Live sensors & relays</div>
    </a>
  </div>
</body>
</html>
